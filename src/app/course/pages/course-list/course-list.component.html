<div class="container-fluid">
  <div class="row mb-4">
    <div class="col">
      <h2 class="page-title">
        <i class="fas fa-book me-2"></i>
        Course Management
      </h2>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary" (click)="navigateToAdd()">
        <i class="fas fa-plus me-2"></i>
        Add Course
      </button>
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-6">
      <div class="input-group">
        <span class="input-group-text">
          <i class="fas fa-search"></i>
        </span>
        <input
          type="text"
          class="form-control"
          placeholder="Search by name or code..."
          [ngModel]="searchTerm()"
          (ngModelChange)="onSearchChange($event)"
        />
      </div>
    </div>
    <div class="col-md-3">
      <select
        class="form-select"
        [ngModel]="statusFilter()"
        (ngModelChange)="onStatusChange($event)"
      >
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>
  </div>

  @if (isLoading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3 text-muted">Loading courses...</p>
    </div>
  } @else {
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table mat-table [dataSource]="dataSource" class="table table-hover">
            <ng-container matColumnDef="course_name">
              <th mat-header-cell *matHeaderCellDef>Course Name</th>
              <td mat-cell *matCellDef="let course">{{ course.course_name }}</td>
            </ng-container>

            <ng-container matColumnDef="course_code">
              <th mat-header-cell *matHeaderCellDef>Code</th>
              <td mat-cell *matCellDef="let course">
                <span class="badge bg-secondary">{{ course.course_code }}</span>
              </td>
            </ng-container>

            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let course">
                @if (course.status === 'active') {
                  <span class="badge bg-success">Active</span>
                } @else {
                  <span class="badge bg-danger">Inactive</span>
                }
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let course">
                <button
                  class="btn btn-sm btn-primary me-2"
                  (click)="navigateToEdit(course)"
                  title="Edit"
                >
                  <i class="fas fa-pencil-alt"></i>
                </button>
                <button
                  class="btn btn-sm btn-warning me-2"
                  (click)="onToggleStatus(course)"
                  [title]="course.status === 'active' ? 'Deactivate' : 'Activate'"
                >
                  @if (course.status === 'active') {
                    <i class="fas fa-ban"></i>
                  } @else {
                    <i class="fas fa-check"></i>
                  }
                </button>
                <button class="btn btn-sm btn-danger" (click)="onDelete(course)" title="Delete">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

            <tr class="mat-row" *matNoDataRow>
              <td class="mat-cell text-center py-4" [attr.colspan]="displayedColumns.length">
                <div class="text-muted">
                  <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                  No courses found
                </div>
              </td>
            </tr>
          </table>
        </div>

        <mat-paginator
          [pageSizeOptions]="[10, 25, 50, 100]"
          [pageSize]="pageSize()"
          [length]="totalElements()"
          [pageIndex]="currentPage() - 1"
          (page)="onPageChange($event)"
          showFirstLastButtons
        >
        </mat-paginator>
      </div>
    </div>
  }
</div>
